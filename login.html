<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login SOT - PBC SyncFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-blue-600 selection:text-white">

    <div class="hidden sm:block"></div>

    <div class="w-full max-w-md mx-auto p-6 my-auto">
        <div class="bg-slate-800/80 backdrop-blur-md rounded-2xl border border-slate-700/60 p-8 shadow-2xl relative overflow-hidden">
            
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/10 rounded-full blur-2xl pointer-events-none"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-cyan-600/10 rounded-full blur-2xl pointer-events-none"></div>

            <div class="text-center mb-8 relative">
                <div class="inline-flex bg-gradient-to-br from-blue-500 to-indigo-600 p-3 rounded-xl shadow-lg shadow-blue-500/20 mb-4">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold tracking-tight text-white">Login SOT</h2>
                <p class="text-xs text-slate-400 mt-1">Sistem Operasional Terintegrasi Portal</p>
            </div>

            <div class="space-y-4">
                
                <div class="relative">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 pointer-events-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </span>
                        <input type="text" id="nama" placeholder="Nama Pengguna" autocomplete="off" 
                            class="w-full bg-slate-900/60 border border-slate-700 rounded-xl pl-11 pr-4 py-3 text-white text-base placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition duration-200">
                    </div>
                    <div id="autocomplete-box" class="absolute left-0 right-0 mt-1 bg-slate-800 border border-slate-700/80 rounded-xl max-h-48 overflow-y-auto z-50 shadow-xl hidden divide-y divide-slate-700/40"></div>
                </div>

                <div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 pointer-events-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </span>
                        <input type="password" id="pin" placeholder="PIN" 
                            inputmode="numeric" pattern="[0-9]*" maxlength="6"
                            class="w-full bg-slate-900/60 border border-slate-700 rounded-xl pl-11 pr-4 py-3 text-white text-base placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition duration-200">
                    </div>
                </div>

                <button onclick="login()" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold text-base py-3 px-4 rounded-xl shadow-lg shadow-blue-600/10 hover:shadow-blue-600/20 transition duration-200 cursor-pointer active:scale-[0.99] mt-2 disabled:bg-slate-700 disabled:text-slate-400 disabled:cursor-not-allowed disabled:scale-100 disabled:shadow-none">
                    Log in
                </button>

                <div class="msg pt-2 text-center text-sm font-medium min-h-[24px]" id="msg"></div>
            </div>

        </div>
    </div>

    <footer class="w-full text-center py-4 text-xs text-slate-500 border-t border-slate-800/40 bg-slate-950/30">
        <p>Power by: Google Apps Script & PBC Internal Dev Team</p>
    </footer>

    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwoz7fGFbbV5kDdKDGCvYxHsJG3Nm5_0KAk-9Nu7kYO05U_FW1MwI8DBch2amyT45pZmQ/exec";
    let userDataNames = [];
    let currentMatches = []; // Menyimpan daftar kecocokan nama aktif

    function setupAutocomplete(input, box, data) {
        input.oninput = () => {
            const val = input.value.trim().toLowerCase();
            if (!val) {
                box.style.display = "none";
                currentMatches = [];
                return;
            }

            currentMatches = data
                .filter(d => d.toLowerCase().includes(val))
                .slice(0, 10);

            box.innerHTML = currentMatches.map(m =>
                `<div class="autocomplete-item px-4 py-3 text-sm text-slate-300 hover:bg-slate-700/60 hover:text-white cursor-pointer transition duration-150">${m}</div>`
            ).join('');
            box.style.display = currentMatches.length ? "block" : "none";

            box.querySelectorAll(".autocomplete-item").forEach(div => {
                div.onclick = () => {
                    input.value = div.textContent;
                    box.style.display = "none";
                    currentMatches = [];
                    document.getElementById("pin").focus();
                };
            });
        };

        document.addEventListener("click", (e) => {
            if (e.target !== input && e.target !== box) {
                box.style.display = "none";
            }
        });
    }

    async function loadUsers() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            userDataNames = data.map(u => u.nama);
            
            setupAutocomplete(document.getElementById("nama"), document.getElementById("autocomplete-box"), userDataNames);
        } catch (err) {
            console.error("Gagal memuat data pengguna:", err);
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        // Jalankan pemuatan data nama secara langsung tanpa menunggu background image
        loadUsers();

        const pinInput = document.getElementById("pin");
        const namaInput = document.getElementById("nama");
        const box = document.getElementById("autocomplete-box");

        // Batasi input PIN agar hanya menerima angka
        pinInput.oninput = function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        };

        // Kontrol penekanan tombol Enter pada input nama
        namaInput.onkeydown = (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                // Jika menu autocomplete aktif dan ada pilihan, ambil yang pertama
                if (box.style.display === "block" && currentMatches.length > 0) {
                    namaInput.value = currentMatches[0];
                    box.style.display = "none";
                    currentMatches = [];
                }
                pinInput.focus();
            }
        };

        // Kontrol penekanan tombol Enter pada input PIN
        pinInput.onkeydown = (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                login();
            }
        };
    });

    async function login() {
        const nama = document.getElementById("nama").value.trim();
        const pin = document.getElementById("pin").value.trim();
        const msg = document.getElementById("msg");
        const btnSubmit = document.getElementById("btn-submit");

        if (!nama || !pin) {
            msg.innerHTML = "Isi nama dan PIN!";
            msg.className = "msg text-amber-500 animate-pulse";
            return;
        }

        if (pin.length !== 6) {
            msg.innerHTML = "PIN harus berisi 6 digit angka!";
            msg.className = "msg text-amber-500";
            return;
        }

        // Kunci tombol dan tampilkan animasi loading
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = "Memproses...";
        msg.innerHTML = "<div class='inline-block animate-spin h-4 w-4 border-2 border-slate-400 border-t-blue-500 rounded-full mr-2 vertical-middle'></div> Memvalidasi kredensial...";
        msg.className = "msg text-slate-400";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `nama=${encodeURIComponent(nama)}&pin=${encodeURIComponent(pin)}`
            });
            const result = await res.json();

            if (result.success) {
                msg.innerHTML = "✓ Login berhasil! Mengalihkan...";
                msg.className = "msg text-emerald-500 font-semibold";
                
                localStorage.setItem("user", JSON.stringify(result));
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
            } else {
                msg.innerHTML = result.message || "Akses ditolak. Periksa kembali PIN Anda.";
                msg.className = "msg text-rose-500";
                // Kembalikan status tombol jika gagal
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Log in";
            }
        } catch (err) {
            msg.innerHTML = "Gagal memproses koneksi ke backend SOT Portal.";
            msg.className = "msg text-rose-500";
            // Kembalikan status tombol jika terjadi gangguan jaringan
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = "Log in";
        }
    }
    </script>
</body>
</html>
