<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SOT</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        select, input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .error { color: red; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="text-align: center;">Login SOT</h2>
    <select id="userSelect">
        <option value="">Memuat user...</option>
    </select>
    <input type="password" id="pinInput" placeholder="Masukkan PIN" inputmode="numeric">
    <div id="errorMsg" class="error"></div>
    <button id="loginBtn">MASUK</button>
</div>

<script>
    // GANTI DENGAN URL WEB APP GAS ANDA
    const WEB_APP_URL = "URL_GOOGLE_APPS_SCRIPT_ANDA_DI_SINI";

    const userSelect = document.getElementById('userSelect');
    const pinInput = document.getElementById('pinInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    // 1. Ambil daftar user saat halaman dimuat
    async function loadUsers() {
        try {
            const resp = await fetch(`${WEB_APP_URL}?action=getUsers`);
            const users = await resp.json();
            userSelect.innerHTML = '<option value="">Pilih Nama</option>';
            users.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                userSelect.appendChild(opt);
            });
        } catch (e) {
            errorMsg.textContent = "Gagal memuat user.";
        }
    }

    // 2. Proses Login
    loginBtn.addEventListener('click', async () => {
        const name = userSelect.value;
        const pin = pinInput.value;

        if (!name || !pin) {
            errorMsg.textContent = "Nama dan PIN harus diisi!";
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Memproses...";
        errorMsg.textContent = "";

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // Penting untuk GAS
                body: JSON.stringify({ name, pin })
            });

            /* CATATAN: Karena mode 'no-cors', kita tidak bisa membaca isi JSON secara langsung.
               Untuk sistem yang lebih aman di GitHub, disarankan menggunakan redirect 
               atau menyimpan data login di localStorage setelah validasi sukses.
               
               Sebagai alternatif sederhana, kita lakukan fetch ulang atau 
               asumsikan jika tidak error, kita arahkan ke dashboard.
            */
            
            // Opsional: Simpan nama di local storage untuk dashboard
            localStorage.setItem('userName', name);
            
            // Redirect ke dashboard (ganti dashboard.html sesuai file Anda)
            window.location.href = "dashboard.html";
            
        } catch (e) {
            errorMsg.textContent = "Terjadi kesalahan koneksi.";
            loginBtn.disabled = false;
            loginBtn.textContent = "MASUK";
        }
    });

    loadUsers();
</script>

</body>
</html>
