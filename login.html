<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login SOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 350px;
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    /* Mengatur kotak input agar seragam dan rapi */
    input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #007bff;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin-top: 15px;
      transition: background 0.3s;
    }

    button:hover {
      background: #0056b3;
    }

    .msg {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .error { color: #d93025; }
    .success { color: #188038; }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login SOT</h2>

  <input type="text" id="nama" list="list-nama" placeholder="Ketik Nama Anda..." autocomplete="off">
  <datalist id="list-nama">
    </datalist>

  <input type="password" id="pin" placeholder="Masukkan PIN">

  <button onclick="login()">Login</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwoz7fGFbbV5kDdKDGCvYxHsJG3Nm5_0KAk-9Nu7kYO05U_FW1MwI8DBch2amyT45pZmQ/exec";

// Load data nama untuk mengisi sugesti (GET)
async function loadUsers() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const data = JSON.parse(text);

    const datalist = document.getElementById("list-nama");
    datalist.innerHTML = ""; // Bersihkan list sebelum isi ulang

    data.forEach(u => {
      const opt = document.createElement("option");
      opt.value = u.nama;
      datalist.appendChild(opt);
    });

  } catch (err) {
    console.error(err);
    document.getElementById("msg").innerHTML = "Gagal memuat daftar nama";
  }
}

// Fungsi Login (POST)
async function login() {
  const nama = document.getElementById("nama").value.trim();
  const pin = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msg");

  if (!nama || !pin) {
    msg.innerHTML = "Nama dan PIN harus diisi!";
    msg.className = "msg error";
    return;
  }

  msg.innerHTML = "Memverifikasi...";
  msg.className = "msg";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: `nama=${encodeURIComponent(nama)}&pin=${encodeURIComponent(pin)}`
    });

    const result = await res.json();

    if (result.success) {
      msg.innerHTML = "Login berhasil!";
      msg.className = "msg success";
      localStorage.setItem("user", JSON.stringify(result));
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
    } else {
      msg.innerHTML = result.message || "Login gagal";
      msg.className = "msg error";
    }

  } catch (err) {
    msg.innerHTML = "Gagal koneksi ke server";
    msg.className = "msg error";
  }
}

window.onload = loadUsers;
</script>

</body>
</html>
