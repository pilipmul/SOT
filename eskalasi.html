<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Form Eskalasi Budget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // SECURITY CHECK: Wajib Login & Punya Akses 'Eskalasi'
    const userData = JSON.parse(localStorage.getItem("user"));
    if (!userData || userData.akses.eskalasi !== "Y") {
      window.location.replace("login.html");
      document.documentElement.style.display = "none";
    }
  </script>
  <style>
    body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
    .form-container { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #218838; }
    .back-link { display: block; margin-bottom: 15px; text-decoration: none; color: #007bff; }
  </style>
</head>
<body>

<div class="form-container">
  <a href="dashboard.html" class="back-link">← Kembali</a>
  <h2>Input Eskalasi Baru</h2>
  <form id="formEskalasi">
    <label>Nomor Surat</label>
    <input type="text" id="nomorSurat" placeholder="Otomatis atau Manual" required>
    
    <label>Unit / Bagian</label>
    <input type="text" id="unit" required>
    
    <label>Keperluan</label>
    <textarea id="keperluan" rows="3" required></textarea>
    
    <label>Nominal Budget (Rp)</label>
    <input type="number" id="nominal" required>
    
    <button type="submit" id="btnSubmit">Kirim Eskalasi</button>
  </form>
  <p id="msg" style="text-align:center;"></p>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzq9eOM9xHp0vJg2tFKhCLn-OLmz_brHdeVqqAgkTMe0NiGVFvyqbVv4RoiF9AxZ8r4/exec"; // Tempel URL Deployment GAS di sini

  document.getElementById("formEskalasi").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btnSubmit");
    const msg = document.getElementById("msg");
    
    btn.disabled = true;
    msg.innerText = "Mengirim...";

    const payload = {
      nomorSurat: document.getElementById("nomorSurat").value,
      pemohon: userData.nama, // Diambil dari data login
      unit: document.getElementById("unit").value,
      keperluan: document.getElementById("keperluan").value,
      nominal: document.getElementById("nominal").value
    };

    try {
      const response = await fetch(API_URL + "?action=submitEskalasi", {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const res = await response.json();
      
      if (res.success) {
        msg.style.color = "green";
        msg.innerText = "Berhasil disimpan!";
        document.getElementById("formEskalasi").reset();
      }
    } catch (err) {
      msg.style.color = "red";
      msg.innerText = "Gagal mengirim data.";
    } finally {
      btn.disabled = false;
    }
  };
</script>

</body>
</html>
