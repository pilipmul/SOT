<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOT - Dokumentasi Perbaikan (SR)</title>
    <script>
        (function() {
            const session = localStorage.getItem("user");
            const userData = session ? JSON.parse(session) : null;
            if (!userData) {
                window.location.replace("login.html");
                document.documentElement.style.display = "none";
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide">SOT (Sistem Operasional Terintegrasi)</h1>
                    <p class="text-xs text-slate-400">Dokumentasi Laporan Perbaikan (Sheet SR)</p>
                </div>
            </div>
            <div class="text-sm text-right hidden sm:block">
                <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full font-medium border border-blue-500/30">CSV Dynamic Sync</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="bg-white p-4 rounded-xl shadow-xs border border-slate-200 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="relative w-full md:w-96">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari objek atau tanggal..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div class="flex items-center gap-2 self-end md:self-auto text-xs text-slate-500">
                <button onclick="fetchCSVData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium shadow-xs transition flex items-center gap-2 cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.253 8H18"></path></svg>
                    Refresh Data
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-xs border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200 text-left text-sm" id="reportTable">
                    <thead class="bg-slate-900 text-white uppercase text-xs tracking-wider">
                        <tr>
                            <th scope="col" class="px-6 py-4 font-semibold w-16">No</th>
                            <th scope="col" class="px-6 py-4 font-semibold">Objek</th>
                            <th scope="col" class="px-6 py-4 font-semibold">Tanggal</th>
                            <th scope="col" class="px-6 py-4 font-semibold text-center">Before (Z)</th>
                            <th scope="col" class="px-6 py-4 font-semibold text-center">After (AA)</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200" id="tableBody">
                        <tr id="loadingRow">
                            <td colspan="5" class="px-6 py-12 text-center text-slate-500">
                                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-300 border-t-blue-600 mb-2"></div>
                                <p class="font-medium">Sedang memuat data dari Google Sheets...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="bg-slate-50 px-6 py-4 border-t border-slate-200 text-xs text-slate-500 flex justify-between items-center">
                <span>Total Laporan: <strong id="totalRecords" class="text-slate-700">0</strong> baris ditemukan</span>
                <span>Power by: PBC Internal Dev Team</span>
            </div>
        </div>
    </main>

    <div id="imageModal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
        <div class="relative max-w-3xl w-full bg-white rounded-xl overflow-hidden shadow-2xl flex flex-col">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-900 text-white">
                <h3 id="modalTitle" class="font-semibold text-sm">Preview Dokumentasi</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white transition cursor-pointer text-xl font-bold">&times;</button>
            </div>
            <div class="p-2 flex justify-center items-center bg-slate-100 max-h-[75vh]">
                <img id="modalImage" src="" alt="Dokumentasi Perbaikan" class="max-w-full max-h-[70vh] object-contain rounded">
            </div>
        </div>
    </div>

    <script>
        // Gunakan GID spesifik dari sheet SR jika Anda sudah memilikinya. 
        // Sementara ini menembak link dasar CSV publikasi Anda.
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vScnbvhwMQ-Ba56JEyetsYAQWXk4LFOKe8yM-gBBQueazPaL-6u5d3V6m_e9cO4sHxOIglIqxSjeAVl/pub?output=csv";

        async function fetchCSVData() {
            const tableBody = document.getElementById('tableBody');
            const totalRecords = document.getElementById('totalRecords');

            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                
                const rows = parseCSV(csvText);
                tableBody.innerHTML = '';

                // Mapping kolom berbasis indeks 0 (X=23, Y=24, Z=25, AA=26)
                const colX = 23;
                const colY = 24;
                const colZ = 25;
                const colAA = 26;

                let validRowCount = 0;

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length <= colX) continue;
                    
                    const valX = (row[colX] || '').trim();
                    const valY = (row[colY] || '').trim();
                    const valZ = (row[colZ] || '').trim();
                    const valAA = (row[colAA] || '').trim();

                    // Lewati jika baris data kosong utamanya pada nama objek
                    if (!valX && !valY) continue;

                    validRowCount++;

                    // Helper render kolom dokumentasi gambar
                    const renderPhotoCell = (url, type, objectName) => {
                        if (!url) return `<span class="text-slate-400 italic text-xs">Tidak ada foto</span>`;
                        if (url.startsWith('http://') || url.startsWith('https://')) {
                            return `
                                <button onclick="openModal('${url}', '${type} - ${objectName.replace(/'/g, "\\'")}')" class="inline-flex items-center gap-1.5 bg-slate-100 hover:bg-blue-50 text-slate-700 hover:text-blue-600 px-3 py-1.5 rounded-lg font-medium text-xs border border-slate-200 hover:border-blue-200 transition cursor-pointer">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    Lihat Foto
                                </button>
                            `;
                        }
                        return `<span class="text-slate-600 break-all text-xs">${url}</span>`;
                    };

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50/80 transition duration-150 odd:bg-white even:bg-slate-50/40";
                    
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-slate-400 font-medium">${validRowCount}</td>
                        <td class="px-6 py-4 font-semibold text-slate-900">${valX || '-'}</td>
                        <td class="px-6 py-4 text-slate-600 whitespace-nowrap">${valY || '-'}</td>
                        <td class="px-6 py-4 text-center whitespace-nowrap">${renderPhotoCell(valZ, 'Before', valX)}</td>
                        <td class="px-6 py-4 text-center whitespace-nowrap">${renderPhotoCell(valAA, 'After', valX)}</td>
                    `;
                    tableBody.appendChild(tr);
                }

                totalRecords.innerText = validRowCount;

                if (validRowCount === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">Data laporan tidak ditemukan. Pastikan settingan Publish to Web sudah mengarah ke sheet "SR".</td></tr>`;
                }

            } catch (error) {
                console.error("Error:", error);
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-red-500 font-medium">Gagal memproses data CSV. Terjadi kendala koneksi atau struktur data.</td></tr>`;
            }
        }

        // Standard CSV Parser (RFC 4180)
        function parseCSV(text) {
            let p = '', r = [];
            let q = false;
            let row = [''];
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') {
                    q = !q;
                } else if (c === ',' && !q) {
                    row.push('');
                    c = '';
                } else if ((c === '\r' || c === '\n') && !q) {
                    if (c === '\n') {
                        r.push(row);
                        row = [''];
                    }
                    c = '';
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') r.push(row);
            return r;
        }

        // Live Search Filter
        function filterTable() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("reportTable");
            const tr = table.getElementsByTagName("tr");
            let visibleCount = 0;

            for (let i = 1; i < tr.length; i++) {
                if (tr[i].id === 'loadingRow') continue;
                let match = false;
                const tds = tr[i].getElementsByTagName("td");
                
                // Cari di kolom Objek (indeks 1) dan Tanggal (indeks 2)
                for (let j = 1; j <= 2; j++) {
                    if (tds[j]) {
                        if (tds[j].textContent.toUpperCase().indexOf(filter) > -1) {
                            match = true;
                            break;
                        }
                    }
                }
                if (match) {
                    tr[i].style.display = "";
                    visibleCount++;
                } else {
                    tr[i].style.display = "none";
                }
            }
            document.getElementById("totalRecords").innerText = visibleCount;
        }

        // Fungsi Modal Pop-up
        function openModal(url, title) {
            document.getElementById('modalImage').src = url;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('imageModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.add('hidden');
            document.getElementById('modalImage').src = '';
        }

        // Tutup modal jika area luar gambar diklik
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        window.onload = fetchCSVData;
    </script>
</body>
</html>
