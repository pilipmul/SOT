<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapat Kerja Mingguan - SOT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: sans-serif; }
    .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .table-responsive { max-height: 70vh; overflow-y: auto; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container-fluid py-4">
  <div class="card bg-white p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <div>
        <h3 class="fw-bold mb-0">Rapat Kerja Mingguan (RKM)</h3>
        <p class="text-muted mb-0">User Aktif: <span id="txtCurrentUser" class="fw-bold text-primary">-</span></p>
      </div>
      <button id="btnTambah" class="btn btn-success hidden" onclick="openModal()">
        + Tambah Agenda Baru
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle border">
        <thead class="table-dark sticky-top">
          <tr>
            <th>No</th>
            <th>Sumber</th>
            <th>Rencana</th>
            <th>Kendala</th>
            <th>PIC</th>
            <th>Update</th>
            <th>Target</th>
            <th>Realisasi</th>
            <th id="thAksi" class="hidden text-center">Aksi</th>
          </tr>
        </thead>
        <tbody id="rkmTableBody">
          <tr>
            <td colspan="9" class="text-center text-muted py-4">Memuat data RKM...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="rkmModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="modalTitle">Tambah Agenda RKM</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="rkmForm">
          <input type="hidden" id="inpRowNum">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">No Agenda</label>
              <input type="text" id="inpNo" class="form-validate form-control" required>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">Sumber</label>
              <input type="text" id="inpSumber" class="form-validate form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Rencana Kegiatan</label>
              <textarea id="inpRencana" class="form-validate form-control" rows="3" required></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Kendala</label>
              <textarea id="inpKendala" class="form-control" rows="2"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">PIC</label>
              <input type="text" id="inpPic" class="form-validate form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Target Selesai</label>
              <input type="text" id="inpTarget" class="form-control" placeholder="Contoh: 20-07-2026 atau W3 Juli">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Update Progress</label>
              <textarea id="inpUpdate" class="form-control" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Realisasi / Hasil Akhir</label>
              <input type="text" id="inpRealisasi" class="form-control">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-primary" onclick="submitForm()">Simpan Data</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // URL Deployment Web App Google Apps Script Anda
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwoz7fGFbbV5kDdKDGCvYxHsJG3Nm5_0KAk-9Nu7kYO05U_FW1MwI8DBch2amyT45pZmQ/exec";
  
  // Simulasi Session User Login dari Portal Utama SOT
  // Pada implementasi riil, ambil variable nama ini dari localStorage/session setelah proses login berhasil
  const CURRENT_USER = localStorage.getItem("sot_username") || "Tamu"; 
  
  let rkmDataCache = [];
  let bootstrapModal;

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("txtCurrentUser").innerText = CURRENT_USER;
    bootstrapModal = new bootstrap.Modal(document.getElementById('rkmModal'));
    fetchRKMData();
  });

  // Fungsi mengambil data dari server Backend GAS
  function fetchRKMData() {
    const url = `${WEB_APP_URL}?action=getRKM&currentUser=${encodeURIComponent(CURRENT_USER)}`;
    
    fetch(url)
      .then(res => {
        // Memastikan server merespons dengan status HTTP OK (200)
        if (!res.ok) {
          throw new Error("HTTP error, status = " + res.status);
        }
        return res.json();
      })
      .then(response => {
        // Melindungi dari response null atau undefined
        if (response && response.success) {
          rkmDataCache = response.data;
          renderTable(response.data, response.hasEditAccess);
        } else {
          alert("Gagal memuat data: " + (response ? response.message : "Format data salah"));
        }
      })
      .catch(err => {
        console.error("Detail Error:", err);
        alert("Terjadi kesalahan sistem: " + err.message);
      });
  }

  // Merender baris tabel secara dinamis beserta kontrol akses tombol
  function renderTable(data, hasEditAccess) {
    const tbody = document.getElementById("rkmTableBody");
    tbody.innerHTML = "";

    if (hasEditAccess) {
      document.getElementById("btnTambah").classList.remove("hidden");
      document.getElementById("thAksi").classList.remove("hidden");
    }

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${hasEditAccess ? 9 : 8}" class="text-center text-muted py-3">Tidak ada agenda kerja minggu ini.</td></tr>`;
      return;
    }

    data.forEach((item, index) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><b>${item.no}</b></td>
        <td>${item.sumber}</td>
        <td>${item.rencana}</td>
        <td>${item.kendala || '-'}</td>
        <td><span class="badge bg-secondary">${item.pic}</span></td>
        <td>${item.update || '-'}</td>
        <td>${item.target || '-'}</td>
        <td>${item.realisasi || '-'}</td>
        ${hasEditAccess ? `
          <td class="text-center">
            <div class="btn-group btn-group-sm">
              <button class="btn btn-warning" onclick="openModal(${index})">Edit</button>
              <button class="btn btn-danger" onclick="deleteItem(${item.rowNum})">Hapus</button>
            </div>
          </td>
        ` : ""}
      `;
      tbody.appendChild(tr);
    });
  }

  // Mengatur pembukaan modal form baik untuk entri baru maupun edit data
  function openModal(index = null) {
    const form = document.getElementById("rkmForm");
    form.reset();
    document.getElementById("inpRowNum").value = "";

    if (index !== null) {
      document.getElementById("modalTitle").innerText = "Edit Agenda RKM";
      const item = rkmDataCache[index];
      document.getElementById("inpRowNum").value = item.rowNum;
      document.getElementById("inpNo").value = item.no;
      document.getElementById("inpSumber").value = item.sumber;
      document.getElementById("inpRencana").value = item.rencana;
      document.getElementById("inpKendala").value = item.kendala;
      document.getElementById("inpPic").value = item.pic;
      document.getElementById("inpTarget").value = item.target;
      document.getElementById("inpUpdate").value = item.update;
      document.getElementById("inpRealisasi").value = item.realisasi;
    } else {
      document.getElementById("modalTitle").innerText = "Tambah Agenda RKM";
    }
    bootstrapModal.show();
  }

  // Aksi simpan (Create / Update) data ke spreadsheet
  function submitForm() {
    const form = document.getElementById("rkmForm");
    if(!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const rowNum = document.getElementById("inpRowNum").value;
    const payload = {
      rowNum: rowNum ? parseInt(rowNum) : null,
      no: document.getElementById("inpNo").value,
      sumber: document.getElementById("inpSumber").value,
      rencana: document.getElementById("inpRencana").value,
      kendala: document.getElementById("inpKendala").value,
      pic: document.getElementById("inpPic").value,
      target: document.getElementById("inpTarget").value,
      update: document.getElementById("inpUpdate").value,
      realisasi: document.getElementById("inpRealisasi").value
    };

    const url = `${WEB_APP_URL}?action=saveRKM&currentUser=${encodeURIComponent(CURRENT_USER)}`;

    fetch(url, {
      method: "POST",
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(res => {
      if (res.success) {
        bootstrapModal.hide();
        fetchRKMData();
      } else {
        alert(res.message);
      }
    })
    .catch(err => alert("Gagal menyimpan data ke Google Sheets."));
  }

  // Aksi Hapus data (Delete) berdasarkan index baris spreadsheet asli
  function deleteItem(rowNum) {
    if (!confirm("Apakah Anda yakin ingin menghapus baris agenda ini secara permanen?")) return;

    const url = `${WEB_APP_URL}?action=deleteRKM&currentUser=${encodeURIComponent(CURRENT_USER)}`;
    
    fetch(url, {
      method: "POST",
      body: JSON.stringify({ rowNum: rowNum })
    })
    .then(res => res.json())
    .then(res => {
      if (res.success) {
        fetchRKMData();
      } else {
        alert(res.message);
      }
    })
    .catch(err => alert("Gagal menghapus data."));
  }
</script>
</body>
</html>
