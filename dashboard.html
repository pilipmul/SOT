<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard SOT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Mempertahankan default sembunyi bawaan fungsi akses Anda */
        .menu-card { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide">SOT (Sistem Operasional Terintegrasi)</h1>
                    <p class="text-xs text-slate-400">Halo, <span id="user-name" class="text-blue-400 font-semibold">User</span></p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-sm text-right hidden sm:block">
                    <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full font-medium border border-blue-500/30">Dashboard Portal</span>
                </div>
                <button class="bg-red-600 hover:bg-red-700 text-white text-xs px-4 py-2 rounded-lg font-medium shadow-xs transition cursor-pointer" onclick="logout()">
                    Logout
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="border-b border-slate-200 pb-3 mb-6">
            <h2 class="text-xl font-bold tracking-tight text-slate-900">Menu Utama</h2>
            <p class="text-xs text-slate-500">Pilih modul aplikasi operasional yang ingin Anda akses</p>
        </div>

        <div class="grid grid-columns-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="menu-wrapper">
            
            <a href="eskalasi.html" class="menu-card bg-white p-6 rounded-xl border border-slate-200 shadow-xs text-center text-blue-600 font-bold text-sm hover:-translate-y-1 hover:bg-blue-600 hover:text-white hover:border-blue-600 transition duration-200" id="eskalasi">
                Eskalasi
            </a>
            
            <a href="teguran.html" class="menu-card bg-white p-6 rounded-xl border border-slate-200 shadow-xs text-center text-blue-600 font-bold text-sm hover:-translate-y-1 hover:bg-blue-600 hover:text-white hover:border-blue-600 transition duration-200" id="suratTeguran">
                Surat Teguran
            </a>
            
            <a href="sr.html" class="menu-card bg-white p-6 rounded-xl border border-slate-200 shadow-xs text-center text-blue-600 font-bold text-sm hover:-translate-y-1 hover:bg-blue-600 hover:text-white hover:border-blue-600 transition duration-200" id="dokPerbaikan">
                Dok. Perbaikan
            </a>
            
            <a href="schedule.html" class="menu-card bg-white p-6 rounded-xl border border-slate-200 shadow-xs text-center text-blue-600 font-bold text-sm hover:-translate-y-1 hover:bg-blue-600 hover:text-white hover:border-blue-600 transition duration-200" id="tasks">
                Tasks
            </a>
            
            <a href="https://pilipmul.github.io/PBC/" class="menu-card bg-white p-6 rounded-xl border border-slate-200 shadow-xs text-center text-blue-600 font-bold text-sm hover:-translate-y-1 hover:bg-blue-600 hover:text-white hover:border-blue-600 transition duration-200" id="syncflow">
                Syncflow
            </a>
            
            <a href="access.html" class="menu-card bg-white p-6 rounded-xl border border-slate-200 shadow-xs text-center text-blue-600 font-bold text-sm hover:-translate-y-1 hover:bg-blue-600 hover:text-white hover:border-blue-600 transition duration-200" id="accesControl">
                Access Control
            </a>

        </div>
    </main>

    <footer class="max-w-7xl mx-auto px-4">
        <div class="bg-white rounded-xl border border-slate-200 px-6 py-4 text-xs text-slate-500 flex justify-between items-center shadow-xs">
            <span>Sistem Operasional Terintegrasi Portal</span>
            <span>Power by: PBC Internal Dev Team</span>
        </div>
    </footer>

    <script>
        // 1. Ambil data dari localStorage
        const userData = JSON.parse(localStorage.getItem("user"));

        // 2. Proteksi Halaman: Jika belum login, tendang ke login.html
        if (!userData) {
            window.location.href = "login.html";
        } else {
            document.getElementById("user-name").textContent = userData.nama;
            
            // 3. Logika Menampilkan Menu berdasarkan Akses
            const akses = userData.akses;
            for (let key in akses) {
                if (akses[key] === "Y") {
                    const menuElement = document.getElementById(key);
                    if (menuElement) {
                        menuElement.style.display = "block";
                    }
                }
            }
        }

        function logout() {
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
