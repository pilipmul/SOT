<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Eskalasi Baru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .form-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 750px; }
    .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    .online { background: #d4edda; color: #155724; }
    .offline { background: #f8d7da; color: #721c24; }
    label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .input-group { position: relative; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; }
    table th { background: #eee; padding: 10px; text-align: left; }
    table td { padding: 5px; border-bottom: 1px solid #eee; position: relative; }
    .autocomplete-list {
      position: absolute; border: 1px solid #ddd; border-top: none; z-index: 99;
      top: 100%; left: 0; right: 0; background: #fff; max-height: 150px;
      overflow-y: auto; border-radius: 0 0 5px 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .autocomplete-list div { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #f1f1f1; }
    .autocomplete-list div:hover { background-color: #e9e9e9; }
    .btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
    .btn-success { background: #28a745; color: white; }
    .btn-add { background: #007bff; color: white; width: auto; padding: 8px 15px; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="form-box">
  <div id="koneksiStatus" class="status-badge offline">Mengecek Koneksi...</div>
  <h3>Input Eskalasi Baru</h3>
  
  <form id="formEskin" autocomplete="off">
    <label>Nomor Eskalasi</label>
    <input type="text" id="displayKode" value="Memuat..." disabled style="background: #eee;">
    
    <label>Subject / Keperluan</label>
    <textarea id="subject" rows="2" placeholder="Judul keperluan..." required></textarea>

    <div class="input-group">
      <label>Diajukan Oleh</label>
      <input type="text" id="diajukan" class="user-search" placeholder="Cari nama..." oninput="showUserSuggestions(this)">
      <div class="autocomplete-list"></div>
    </div>
    <div class="input-group"><label>Diketahui Oleh</label><input type="text" id="diketahui" class="user-search" placeholder="Cari nama..." oninput="showUserSuggestions(this)"><div class="autocomplete-list"></div></div>
    <div class="input-group"><label>Disetujui Oleh</label><input type="text" id="disetujui" class="user-search" placeholder="Cari nama..." oninput="showUserSuggestions(this)"><div class="autocomplete-list"></div></div>

    <label>Daftar Item (Maks 10)</label>
    <table>
      <thead><tr><th style="width: 55%;">Nama Item</th><th style="width: 15%;">Qty</th><th>Biaya (Rp)</th></tr></thead>
      <tbody id="itemRows"></tbody>
    </table>
    <button type="button" id="btnAddRow" class="btn btn-add" onclick="tambahBaris()">+ Tambah Baris</button>
    <label>Total Nilai Budget</label>
    <input type="number" id="nilai" readonly style="background: #f9f9f9; font-weight: bold; color: #28a745;">
    <button type="submit" class="btn btn-success" id="btnSubmit" disabled>Kirim & Download PDF</button>
  </form>
</div>

<script>
  const ESKIN_API = "https://script.google.com/macros/s/AKfycbwfkmEdz-8zWoRDoWyi0YOunZwvLofGOUCywP8JK9LMM2lBCUPuiBEC9KbGcLuTflSo-g/exec"; 
  let itemOptions = [];
  const userList = ["Dede H.", "Edo S.", "Sutriono", "(....................)"];
  let rowCount = 0;

  function showUserSuggestions(input) {
    const listContainer = input.nextElementSibling;
    const val = input.value.toLowerCase();
    listContainer.innerHTML = "";
    const filtered = val === "" ? userList : userList.filter(x => x.toLowerCase().includes(val));
    filtered.forEach(name => {
      const div = document.createElement("div");
      div.innerHTML = name;
      div.onclick = () => { input.value = name; listContainer.innerHTML = ""; };
      listContainer.appendChild(div);
    });
  }

  function showItemSuggestions(input) {
    const listContainer = input.nextElementSibling;
    const val = input.value.toLowerCase();
    listContainer.innerHTML = "";
    if (!val) return;
    const filtered = itemOptions.filter(x => x.toLowerCase().includes(val));
    filtered.forEach(item => {
      const div = document.createElement("div");
      div.innerHTML = item;
      div.onclick = () => { input.value = item; listContainer.innerHTML = ""; };
      listContainer.appendChild(div);
    });
  }

  function tambahBaris() {
    if (rowCount >= 10) return;
    rowCount++;
    const tbody = document.getElementById("itemRows");
    const tr = document.createElement("tr");
    tr.innerHTML = `<td><input type="text" class="item-name" placeholder="Ketik nama item..." oninput="showItemSuggestions(this)"><div class="autocomplete-list"></div></td><td><input type="number" class="item-qty" placeholder="0" oninput="hitungTotal()"></td><td><input type="number" class="item-cost" placeholder="0" oninput="hitungTotal()"></td>`;
    tbody.appendChild(tr);
    if (rowCount >= 10) document.getElementById("btnAddRow").disabled = true;
  }

  function hitungTotal() {
    let total = 0;
    document.querySelectorAll("#itemRows tr").forEach(row => {
      total += (Number(row.querySelector(".item-qty").value) || 0) * (Number(row.querySelector(".item-cost").value) || 0);
    });
    document.getElementById("nilai").value = total;
  }

  document.addEventListener("click", (e) => {
    if (!e.target.matches('.user-search, .item-name')) {
      document.querySelectorAll(".autocomplete-list").forEach(l => l.innerHTML = "");
    }
  });

  async function init() {
    try {
      const resNo = await fetch(ESKIN_API + "?action=getNextNomor", { method: "POST" });
      const dataNo = await resNo.json();
      if(dataNo.success) document.getElementById("displayKode").value = dataNo.nextKode;
      const resItem = await fetch(ESKIN_API + "?action=getItems", { method: "POST" });
      const dataItem = await resItem.json();
      if(dataItem.success) { itemOptions = dataItem.items; tambahBaris(); }
      document.getElementById("koneksiStatus").innerText = "● Terhubung";
      document.getElementById("koneksiStatus").className = "status-badge online";
      document.getElementById("btnSubmit").disabled = false;
    } catch (e) { document.getElementById("koneksiStatus").innerText = "● Gagal Koneksi"; }
  }

  document.getElementById("formEskin").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btnSubmit");
    btn.innerText = "Mengirim & Menyiapkan PDF...";
    btn.disabled = true;
    
    const items = [];
    document.querySelectorAll("#itemRows tr").forEach(tr => {
      const name = tr.querySelector(".item-name").value;
      if(name) { items.push({ name: name, qty: tr.querySelector(".item-qty").value, cost: tr.querySelector(".item-cost").value }); }
    });

    try {
      const response = await fetch(ESKIN_API + "?action=submitEskalasi", {
        method: "POST",
        body: JSON.stringify({
          subject: document.getElementById("subject").value,
          diajukan: document.getElementById("diajukan").value,
          diketahui: document.getElementById("diketahui").value,
          disetujui: document.getElementById("disetujui").value,
          nilai: document.getElementById("nilai").value,
          items: items
        })
      });
      const res = await response.json();

      if (res.success) { 
        // ✅ FIX DOWNLOAD PDF (BLOB)
        const byteCharacters = atob(res.pdfData);
        const byteNumbers = new Array(byteCharacters.length);

        for (let i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i);
        }

        const byteArray = new Uint8Array(byteNumbers);
        const blob = new Blob([byteArray], { type: "application/pdf" });

        const url = URL.createObjectURL(blob);

        const link = document.createElement("a");
        link.href = url;
        link.download = res.fileName;

        document.body.appendChild(link);
        link.click();

        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        alert("Data Berhasil Terkirim dan PDF sedang diunduh!"); 
        window.location.href = "eskalasi.html"; 
      }
    } catch (err) { 
      alert("Gagal kirim data."); 
    } finally { 
      btn.disabled = false; 
      btn.innerText = "Kirim & Download PDF";
    }
  };

  window.onload = init;
</script>
</body>
</html>
