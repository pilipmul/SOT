<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Eskalasi Baru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .form-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
    h3 { margin-top: 0; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
    label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
    input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
    .btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 15px; }
    .btn-success { background: #28a745; color: white; }
    .btn-secondary { background: #6c757d; color: white; margin-top: 10px; text-decoration: none; display: block; text-align: center; }
  </style>
</head>
<body>
<div class="form-box">
  <h3>Input Eskalasi Baru</h3>
  <form id="formEskin">
    <label>Kode Eskalasi</label>
    <input type="text" value="Otomatis Sistem" disabled style="background: #eee;">
    
    <label>Subject / Keperluan</label>
    <textarea id="subject" rows="3" placeholder="Contoh: Perbaikan Pompa Sumur" required></textarea>
    
    <label>Tanggal Tampilan</label>
    <input type="text" id="tanggal" placeholder="Contoh: Apr 2026" required>

    <label>Nilai Budget (Rp)</label>
    <input type="number" id="nilai" placeholder="Contoh: 500000" required>
    
    <button type="submit" class="btn btn-success" id="btnSubmit">Kirim Eskalasi</button>
    <a href="eskalasi.html" class="btn btn-secondary">Kembali ke Database</a>
  </form>
</div>

<script>
  const ESKIN_API = "https://script.google.com/macros/s/AKfycbwfkmEdz-8zWoRDoWyi0YOunZwvLofGOUCywP8JK9LMM2lBCUPuiBEC9KbGcLuTflSo-g/exec"; 

  document.getElementById("formEskin").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btnSubmit");
    btn.disabled = true;
    btn.innerText = "Mengirim...";

    const payload = {
      subject: document.getElementById("subject").value,
      tanggal: document.getElementById("tanggal").value,
      nilai: document.getElementById("nilai").value
    };

    try {
      const response = await fetch(ESKIN_API + "?action=submitEskalasi", {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const res = await response.json();
      if (res.success) {
        alert("Berhasil! Nomor Eskalasi: " + res.kode);
        window.location.href = "eskalasi.html"; // Balik ke tabel setelah sukses
      }
    } catch (err) {
      alert("Gagal mengirim data.");
      btn.disabled = false;
      btn.innerText = "Kirim Eskalasi";
    }
  };
</script>
</body>
</html>
