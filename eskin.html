<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Eskalasi Baru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <script>
    (function() {
      const session = localStorage.getItem("user");
      const userData = session ? JSON.parse(session) : null;
      if (!userData || !userData.akses || userData.akses.eskalasi !== "Y") {
        window.location.replace("login.html");
        document.documentElement.style.display = "none";
      }
    })();
  </script>
</head>
<body class="bg-[#f4f7f9] m-0 p-5 flex justify-center font-sans">

<div class="bg-white p-6 rounded-lg shadow-[0_5px_15px_rgba(0,0,0,0.1)] w-full max-w-[750px]">
  <div id="koneksiStatus" class="status-badge text-[11px] px-2 py-1 rounded font-bold mb-2.5 inline-block bg-red-100 text-red-800">
    Mengecek Koneksi...
  </div>
  
  <h3 class="text-xl font-bold text-gray-800 mb-4">Input Eskalasi Baru</h3>
  
  <form id="formEskin" autocomplete="off" class="space-y-4">
    <div>
      <label class="block font-semibold text-gray-600 mb-1">Nomor Eskalasi</label>
      <input type="text" id="displayKode" value="Memuat..." disabled class="w-full p-2.5 border border-gray-300 rounded bg-gray-100 box-border text-gray-500">
    </div>
    
    <div>
      <label class="block font-semibold text-gray-600 mb-1">Subject / Keperluan</label>
      <textarea id="subject" rows="2" placeholder="Judul keperluan..." required class="w-full p-2.5 border border-gray-300 rounded box-border focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
    </div>

    <div class="relative">
      <label class="block font-semibold text-gray-600 mb-1">Diajukan Oleh</label>
      <input type="text" id="diajukan" class="user-search w-full p-2.5 border border-gray-300 rounded box-border focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Cari nama..." oninput="showUserSuggestions(this)">
      <div class="autocomplete-list absolute border border-gray-200 border-t-0 z-50 top-full left-0 right-0 bg-white max-h-[150px] overflow-y-auto rounded-b shadow-md [&>div]:p-2 [&>div]:cursor-pointer [&>div]:border-b [&>div]:border-gray-100 hover:[&>div]:bg-gray-100"></div>
    </div>

    <div class="relative">
      <label class="block font-semibold text-gray-600 mb-1">Diketahui Oleh</label>
      <input type="text" id="diketahui" class="user-search w-full p-2.5 border border-gray-300 rounded box-border focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Cari nama..." oninput="showUserSuggestions(this)">
      <div class="autocomplete-list absolute border border-gray-200 border-t-0 z-50 top-full left-0 right-0 bg-white max-h-[150px] overflow-y-auto rounded-b shadow-md [&>div]:p-2 [&>div]:cursor-pointer [&>div]:border-b [&>div]:border-gray-100 hover:[&>div]:bg-gray-100"></div>
    </div>

    <div class="relative">
      <label class="block font-semibold text-gray-600 mb-1">Disetujui Oleh</label>
      <input type="text" id="disetujui" class="user-search w-full p-2.5 border border-gray-300 rounded box-border focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Cari nama..." oninput="showUserSuggestions(this)">
      <div class="autocomplete-list absolute border border-gray-200 border-t-0 z-50 top-full left-0 right-0 bg-white max-h-[150px] overflow-y-auto rounded-b shadow-md [&>div]:p-2 [&>div]:cursor-pointer [&>div]:border-b [&>div]:border-gray-100 hover:[&>div]:bg-gray-100"></div>
    </div>

    <div>
      <label class="block font-semibold text-gray-600 mb-1">Daftar Item (Maks 10)</label>
      <div class="overflow-x-auto">
        <table class="w-full mt-2 border-collapse text-xs md:text-sm">
          <thead>
            <tr class="bg-gray-100 border-b border-gray-200">
              <th class="p-2 text-left font-semibold text-gray-700" style="width: 55%;">Nama Item</th>
              <th class="p-2 text-left font-semibold text-gray-700" style="width: 15%;">Qty</th>
              <th class="p-2 text-left font-semibold text-gray-700">Biaya (Rp)</th>
            </tr>
          </thead>
          <tbody id="itemRows" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
      <button type="button" id="btnAddRow" class="mt-3 px-4 py-1.5 bg-blue-600 text-white font-semibold text-xs rounded hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" onclick="tambahBaris()">+ Tambah Baris</button>
    </div>

    <div>
      <label class="block font-semibold text-gray-600 mb-1">Total Nilai Budget</label>
      <input type="number" id="nilai" readonly class="w-full p-2.5 border border-gray-300 rounded box-border font-bold text-green-600 bg-gray-50 focus:outline-none">
    </div>

    <button type="submit" class="w-full p-3 bg-green-600 text-white font-bold rounded mt-5 cursor-pointer hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" id="btnSubmit" disabled>Kirim & Download PDF</button>
  </form>
</div>

<script>
  const ESKIN_API = "https://script.google.com/macros/s/AKfycbwfkmEdz-8zWoRDoWyi0YOunZwvLofGOUCywP8JK9LMM2lBCUPuiBEC9KbGcLuTflSo-g/exec"; 
  let itemOptions = [];
  const userList = ["Dede H.", "Edo S.", "Sutriono", "(....................)"];
  let rowCount = 0;

  function cekAutofill() {
    const diajukanVal = document.getElementById("diajukan").value.trim();
    if (diajukanVal === "Dede H.") {
      document.getElementById("diketahui").value = "Edo S.";
      document.getElementById("disetujui").value = "Sutriono";
    } else if (diajukanVal === "Edo S.") {
      document.getElementById("diketahui").value = "Sutriono";
      document.getElementById("disetujui").value = "(....................)";
    }
  }

  function showUserSuggestions(input) {
    const listContainer = input.nextElementSibling;
    const val = input.value.toLowerCase();
    listContainer.innerHTML = "";
    const filtered = val === "" ? userList : userList.filter(x => x.toLowerCase().includes(val));
    filtered.forEach(name => {
      const div = document.createElement("div");
      div.innerHTML = name;
      div.onclick = () => { 
        input.value = name; 
        listContainer.innerHTML = ""; 
        if (input.id === "diajukan") {
          cekAutofill();
        }
      };
      listContainer.appendChild(div);
    });

    if (input.id === "diajukan") {
      cekAutofill();
    }
  }

  function showItemSuggestions(input) {
    const listContainer = input.nextElementSibling;
    const val = input.value.toLowerCase();
    listContainer.innerHTML = "";
    if (!val) return;
    const filtered = itemOptions.filter(x => x.toLowerCase().includes(val));
    filtered.forEach(item => {
      const div = document.createElement("div");
      div.innerHTML = item;
      div.onclick = () => { input.value = item; listContainer.innerHTML = ""; };
      listContainer.appendChild(div);
    });
  }

  function tambahBaris() {
    if (rowCount >= 10) return;
    rowCount++;
    const tbody = document.getElementById("itemRows");
    const tr = document.createElement("tr");
    
    // Penyesuaian class Tailwind v4 untuk baris dinamis baru
    tr.innerHTML = `
      <td class="p-1 relative">
        <input type="text" class="item-name w-full p-2 border border-gray-300 rounded box-border text-sm" placeholder="Ketik nama item..." oninput="showItemSuggestions(this)">
        <div class="autocomplete-list absolute border border-gray-200 border-t-0 z-50 top-full left-0 right-0 bg-white max-h-[150px] overflow-y-auto rounded-b shadow-md [&>div]:p-2 [&>div]:cursor-pointer [&>div]:border-b [&>div]:border-gray-100 hover:[&>div]:bg-gray-100"></div>
      </td>
      <td class="p-1">
        <input type="number" class="item-qty w-full p-2 border border-gray-300 rounded box-border text-sm" placeholder="0" oninput="hitungTotal()">
      </td>
      <td class="p-1">
        <input type="number" class="item-cost w-full p-2 border border-gray-300 rounded box-border text-sm" placeholder="0" oninput="hitungTotal()">
      </td>
    `;
    tbody.appendChild(tr);
    if (rowCount >= 10) document.getElementById("btnAddRow").disabled = true;
  }

  function hitungTotal() {
    let total = 0;
    document.querySelectorAll("#itemRows tr").forEach(row => {
      total += (Number(row.querySelector(".item-qty").value) || 0) * (Number(row.querySelector(".item-cost").value) || 0);
    });
    document.getElementById("nilai").value = total;
  }

  document.addEventListener("click", (e) => {
    if (!e.target.matches('.user-search, .item-name')) {
      document.querySelectorAll(".autocomplete-list").forEach(l => l.innerHTML = "");
    }
  });

  async function init() {
    try {
      const resNo = await fetch(ESKIN_API + "?action=getNextNomor", { method: "POST" });
      const dataNo = await resNo.json();
      if(dataNo.success) document.getElementById("displayKode").value = dataNo.nextKode;
      const resItem = await fetch(ESKIN_API + "?action=getItems", { method: "POST" });
      const dataItem = await resItem.json();
      if(dataItem.success) { itemOptions = dataItem.items; tambahBaris(); }
      
      // Update status koneksi menggunakan Tailwind utility class pengganti .online
      const statusBox = document.getElementById("koneksiStatus");
      statusBox.innerText = "● Terhubung";
      statusBox.className = "status-badge text-[11px] px-2 py-1 rounded font-bold mb-2.5 inline-block bg-green-100 text-green-800";
      
      document.getElementById("btnSubmit").disabled = false;
    } catch (e) { 
      document.getElementById("koneksiStatus").innerText = "● Gagal Koneksi"; 
    }
  }

  document.getElementById("formEskin").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btnSubmit");
    btn.innerText = "Mengirim & Menyiapkan PDF...";
    btn.disabled = true;
    
    const items = [];
    document.querySelectorAll("#itemRows tr").forEach(tr => {
      const name = tr.querySelector(".item-name").value;
      if(name) { items.push({ name: name, qty: tr.querySelector(".item-qty").value, cost: tr.querySelector(".item-cost").value }); }
    });

    try {
      const response = await fetch(ESKIN_API + "?action=submitEskalasi", {
        method: "POST",
        body: JSON.stringify({
          subject: document.getElementById("subject").value,
          diajukan: document.getElementById("diajukan").value,
          diketahui: document.getElementById("diketahui").value,
          disetujui: document.getElementById("disetujui").value,
          nilai: document.getElementById("nilai").value,
          items: items
        })
      });
      const res = await response.json();

      if (res.success) { 
        const byteCharacters = atob(res.pdfData);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        const blob = new Blob([byteArray], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const link = document.createElement("a");
        link.href = url;
        link.download = res.fileName;
        document.body.appendChild(link);
        link.click();
        
        setTimeout(() => {
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
          alert("Data Berhasil Terkirim dan PDF sedang diunduh!"); 
          location.reload(); 
        }, 100);
      }
    } catch (err) { 
      alert("Gagal kirim data."); 
    } finally { 
      btn.disabled = false; 
      btn.innerText = "Kirim & Download PDF";
    }
  };

  window.onload = init;
</script>
</body>
</html>
