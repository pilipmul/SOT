<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Eskalasi Baru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    /* SCRIPT PROTEKSI HALAMAN */
    (function() {
      const session = localStorage.getItem("user");
      const userData = session ? JSON.parse(session) : null;
      const loginPage = "https://pilipmul.github.io/SOT/login.html";

      // Cek apakah user sudah login DAN memiliki akses eskalasi "Y"
      if (!userData || !userData.akses || userData.akses.eskalasi !== "Y") {
        // Jika tidak valid, langsung arahkan ke login
        window.location.replace(loginPage);
        
        // Proteksi tambahan: Sembunyikan elemen dan hentikan loading script
        document.documentElement.style.display = "none";
        window.stop(); 
      }
    })();
  </script>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .form-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
    .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    .online { background: #d4edda; color: #155724; }
    .offline { background: #f8d7da; color: #721c24; }
    label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
    input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
    .btn-success { background: #28a745; color: white; }
  </style>
</head>
<body>
<div class="form-box">
  <div id="koneksiStatus" class="status-badge offline">Mengecek Koneksi...</div>
  <h3>Input Eskalasi Baru</h3>
  
  <form id="formEskin">
    <label>Nomor Eskalasi (Otomatis)</label>
    <input type="text" id="displayKode" value="Memuat nomor..." disabled style="background: #eee; font-weight: bold; color: #007bff;">
    
    <label>Subject / Keperluan</label>
    <textarea id="subject" rows="3" placeholder="Contoh: Perbaikan Pompa Sumur" required></textarea>
    
    <label>Tanggal Tampilan</label>
    <input type="text" id="tanggal" placeholder="Contoh: Apr 2026" required>

    <label>Nilai Budget (Rp)</label>
    <input type="number" id="nilai" placeholder="Contoh: 500000" required>
    
    <button type="submit" class="btn btn-success" id="btnSubmit" disabled>Kirim Eskalasi</button>
    <a href="eskalasi.html" style="display:block; text-align:center; margin-top:15px; color:#666; font-size:13px; text-decoration:none;">← Kembali</a>
  </form>
</div>

<script>
  const ESKIN_API = "https://script.google.com/macros/s/AKfycbwfkmEdz-8zWoRDoWyi0YOunZwvLofGOUCywP8JK9LMM2lBCUPuiBEC9KbGcLuTflSo-g/exec"; 

  // 1. FUNGSI CEK KONEKSI SAAT LOAD
  async function cekKoneksi() {
    const statusDiv = document.getElementById("koneksiStatus");
    const displayKode = document.getElementById("displayKode");
    const btn = document.getElementById("btnSubmit");

    try {
      const response = await fetch(ESKIN_API + "?action=getNextNomor", { method: "POST" });
      const res = await response.json();
      
      if (res.success) {
        statusDiv.innerText = "● Terhubung ke Database";
        statusDiv.className = "status-badge online";
        displayKode.value = res.nextKode;
        btn.disabled = false;
      } else {
        throw new Error(res.error);
      }
    } catch (err) {
      statusDiv.innerText = "● Koneksi Gagal";
      statusDiv.className = "status-badge offline";
      displayKode.value = "Gagal memuat kode";
      console.error(err);
    }
  }

  // 2. FUNGSI SUBMIT
  document.getElementById("formEskin").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btnSubmit");
    btn.disabled = true;
    btn.innerText = "Mengirim...";

    const payload = {
      subject: document.getElementById("subject").value,
      tanggal: document.getElementById("tanggal").value,
      nilai: document.getElementById("nilai").value
    };

    try {
      const response = await fetch(ESKIN_API + "?action=submitEskalasi", {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const res = await response.json();
      if (res.success) {
        alert("Berhasil disimpan dengan nomor: " + res.kode);
        window.location.href = "eskalasi.html";
      } else {
        alert("Error Server: " + res.error);
      }
    } catch (err) {
      alert("Gagal koneksi saat mengirim data.");
    } finally {
      btn.disabled = false;
      btn.innerText = "Kirim Eskalasi";
    }
  };

  // Jalankan cek koneksi saat halaman terbuka
  window.onload = cekKoneksi;
</script>
</body>
</html>
