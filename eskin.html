<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Eskalasi Baru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .form-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
    .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    .online { background: #d4edda; color: #155724; }
    .offline { background: #f8d7da; color: #721c24; }
    label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
    input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; }
    table th { background: #eee; padding: 10px; text-align: left; }
    table td { padding: 5px; border-bottom: 1px solid #eee; }
    .btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
    .btn-success { background: #28a745; color: white; }
    .btn-add { background: #007bff; color: white; width: auto; padding: 8px 15px; font-size: 12px; margin-top: 10px; }
    .btn-add:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="form-box">
  <div id="koneksiStatus" class="status-badge offline">Mengecek Koneksi...</div>
  <h3>Input Eskalasi Baru</h3>
  
  <form id="formEskin">
    <label>Nomor Eskalasi</label>
    <input type="text" id="displayKode" value="Memuat..." disabled style="background: #eee;">
    
    <label>Subject / Keperluan</label>
    <textarea id="subject" rows="2" placeholder="Masukkan judul keperluan..." required></textarea>

    <label>Daftar Item</label>
    <table>
      <thead>
        <tr>
          <th style="width: 50%;">Nama Item</th>
          <th style="width: 15%;">Qty</th>
          <th>Biaya (Rp)</th>
        </tr>
      </thead>
      <tbody id="itemRows"></tbody>
    </table>
    <button type="button" id="btnAddRow" class="btn btn-add" onclick="tambahBaris()">+ Tambah Baris</button>

    <label>Total Nilai Budget (Total Qty x Biaya)</label>
    <input type="number" id="nilai" readonly style="background: #f9f9f9; font-weight: bold; color: #28a745;">
    
    <button type="submit" class="btn btn-success" id="btnSubmit" disabled>Kirim Eskalasi</button>
  </form>
</div>

<script>
  const ESKIN_API = "https://script.google.com/macros/s/AKfycbwfkmEdz-8zWoRDoWyi0YOunZwvLofGOUCywP8JK9LMM2lBCUPuiBEC9KbGcLuTflSo-g/exec"; 
  let itemOptions = [];
  let rowCount = 0;

  // FUNGSI TAMBAH BARIS
  function tambahBaris() {
    if (rowCount >= 10) return;

    rowCount++;
    const tbody = document.getElementById("itemRows");
    const tr = document.createElement("tr");
    
    // Siapkan pilihan option dari itemOptions yang sudah diambil saat init
    let optionsHtml = '<option value="">-- Pilih Item --</option>';
    itemOptions.forEach(itm => {
      optionsHtml += `<option value="${itm}">${itm}</option>`;
    });

    tr.innerHTML = `
      <td><select class="item-select">${optionsHtml}</select></td>
      <td><input type="number" class="item-qty" placeholder="0" oninput="hitungTotal()"></td>
      <td><input type="number" class="item-cost" placeholder="0" oninput="hitungTotal()"></td>
    `;
    tbody.appendChild(tr);

    // Disable tombol jika sudah 10 baris
    if (rowCount >= 10) {
      document.getElementById("btnAddRow").disabled = true;
      document.getElementById("btnAddRow").innerText = "Maksimal 10 Baris";
    }
  }

  function hitungTotal() {
    let totalAkhir = 0;
    const rows = document.querySelectorAll("#itemRows tr");
    rows.forEach(row => {
      const qty = Number(row.querySelector(".item-qty").value) || 0;
      const cost = Number(row.querySelector(".item-cost").value) || 0;
      totalAkhir += (qty * cost);
    });
    document.getElementById("nilai").value = totalAkhir;
  }

  async function init() {
    try {
      // 1. Ambil Nomor Eskalasi
      const resNo = await fetch(ESKIN_API + "?action=getNextNomor", { method: "POST" });
      const dataNo = await resNo.json();
      if(dataNo.success) document.getElementById("displayKode").value = dataNo.nextKode;

      // 2. Ambil Daftar Item (Simpan ke global variable)
      const resItem = await fetch(ESKIN_API + "?action=getItems", { method: "POST" });
      const dataItem = await resItem.json();
      if(dataItem.success) {
        itemOptions = dataItem.items;
        // Munculkan baris pertama setelah data item berhasil diambil
        tambahBaris();
      }

      document.getElementById("koneksiStatus").innerText = "● Terhubung";
      document.getElementById("koneksiStatus").className = "status-badge online";
      document.getElementById("btnSubmit").disabled = false;
    } catch (e) {
      document.getElementById("koneksiStatus").innerText = "● Gagal Koneksi";
    }
  }

  document.getElementById("formEskin").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btnSubmit");
    btn.disabled = true;

    const items = [];
    document.querySelectorAll("#itemRows tr").forEach(tr => {
      const name = tr.querySelector(".item-select").value;
      if(name) {
        items.push({
          name: name,
          qty: tr.querySelector(".item-qty").value,
          cost: tr.querySelector(".item-cost").value
        });
      }
    });

    const payload = {
      subject: document.getElementById("subject").value,
      nilai: document.getElementById("nilai").value,
      items: items
    };

    try {
      const response = await fetch(ESKIN_API + "?action=submitEskalasi", {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const res = await response.json();
      if (res.success) {
        alert("Berhasil! Nomor: " + res.kode);
        location.reload();
      }
    } catch (err) {
      alert("Gagal kirim data.");
    } finally {
      btn.disabled = false;
    }
  };

  window.onload = init;
</script>
</body>
</html>
