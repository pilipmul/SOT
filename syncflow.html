<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PBC SyncFlow</title> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pilipmul/PBC-cek-Piutang/main/Logo%201.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Mengubah Background Utama Menjadi Slate-900 Sangat Gelap & Mobile Friendly */
        body { 
            margin: 0; padding: 0;
            background: #0f172a; /* bg-slate-900 */
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; padding-top: 20px;
            color: #f1f5f9; /* text-slate-100 */
        }
        
        /* Mengubah Container Menjadi Glassmorphism Slate-800 Dengan Border Halus */
        .container { 
            width: 92%; max-width: 440px; 
            background: rgba(30, 41, 59, 0.8); /* bg-slate-800/80 */
            backdrop-filter: blur(12px);
            padding: 20px 22px 28px 22px; 
            border-radius: 16px; 
            border: 1px solid rgba(51, 65, 85, 0.6); /* border-slate-700/60 */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            position: relative; text-align: center;
            margin-bottom: 20px; 
        }
        
        #titleBtn { width: 100%; max-width: 280px; transition: opacity 0.2s; user-select: none; -webkit-user-drag: none; }
        
        /* Penyesuaian Border Pembatas dengan Aksen Biru Slate */
        #nameWrapper { position: relative; padding-top: 2px; border-top: 1px solid #334155; padding-bottom: 2px; border-bottom: 1px solid #334155; }
        
        /* Input & Textarea Diubah Menjadi Transparan dengan Teks Putih */
        input, textarea { 
            width: 100%; padding: 5px 10px; border: none; font-size: 1rem;
            background-color: transparent; text-align: center; height: 34px; 
            line-height: 1.2; display: block; resize: none; color: #ffffff;
        }
        input::placeholder, textarea::placeholder { color: #64748b; } /* slate-500 */
        input:focus, textarea:focus { outline: none; }
        input.item { overflow: hidden; text-overflow: clip; white-space: nowrap; }
        input.item:not(:placeholder-shown):not(:focus) { animation: marquee 10s linear infinite; }
        @keyframes marquee { 0% { text-indent: 100%; } 100% { text-indent: -100%; } }
        
        /* Tombol Bersihkan Konten Bergaya Dark */
        .clear-btn { 
            position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
            background: #334155; color: #94a3b8; border-radius: 50%; width: 20px; height: 20px; 
            display: none; align-items: center; justify-content: center; font-size: 14px; cursor: pointer;
            z-index: 10; font-weight: bold; 
        }
        #nameWrapper:focus-within input:not(:placeholder-shown) ~ .clear-btn, .item-row div:first-child:focus-within input:not(:placeholder-shown) ~ .clear-btn { display: flex; }
        
        .row-3col { display: grid; grid-template-columns: 40% 20% 40%; gap: 0; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #334155; padding-bottom: 5px; padding-top: 5px; position: relative; }
        
        .qty-wrapper { position: relative; display: grid; place-items: center; border-left: 1px solid #334155; border-right: 1px solid #334155; height: 34px; }
        .stock-overlay { grid-area: 1/1; font-size: 1.1rem; font-weight: 700; color: rgba(239, 68, 68, 0.6); pointer-events: none; display: none; z-index: 1; }
        input.qty { grid-area: 1/1; position: relative; z-index: 2; background: transparent !important; padding: 5px 0; -moz-appearance: textfield; }
        input.qty::-webkit-outer-spin-button, input.qty::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input.qty.hide-placeholder::placeholder { color: transparent; }
        textarea.desc { overflow-y: hidden; padding-top: 6px; padding-right: 25px; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; justify-content: center; position: relative; align-items: center; }
        .add-row { background-color: transparent; border: none; width: auto; padding: 8px; flex: none; display: flex; justify-content: center; align-items: center; }
        
        /* Desain Tombol Menyesuaikan Aksen Blue-600 pada Login */
        button { 
            flex: 1; padding: 8px 14px; background-color: #2563eb; color: #fff; border: none; 
            border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; 
            transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        button:hover:not(:disabled) { background-color: #1d4ed8; }
        button:active:not(:disabled) { transform: scale(0.98); }
        button:disabled { background-color: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
        #btnIn { opacity: 0.25; pointer-events: none; background-color: #2563eb; }
        
        /* Dropdown Autocomplete Bergaya Dark Mode */
        .autocomplete-list { 
            position: absolute; background: #1e293b; border: 1px solid #475569; border-radius: 8px;
            z-index: 2000; max-height: 180px; overflow-y: auto; width: 100%; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); text-align: left; display: none; top: 34px; left: 0; 
        }
        .autocomplete-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #334155; color: #cbd5e1; }
        .autocomplete-item:hover { background: #2563eb; color: #fff; }
        
        .delete-row { position: absolute; top: -10px; right: -2px; background: transparent; border: none; color: #ef4444; font-weight: bold; cursor: pointer; font-size: 1.1rem; padding: 5px; opacity: 0.7; box-shadow: none; }
        .delete-row:hover { background: transparent; opacity: 1; }
        #itemContainer .item-row:first-child .delete-row { display: none; }
        
        /* Modifikasi Popup Kredensial & Konfirmasi Bergaya Sleek Gelap */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 6000; }
        .popup-box { background: #1e293b; border-radius: 16px; padding: 24px; width: 90%; max-width: 320px; text-align: center; border: 1px solid #475569; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .modal-btn { width: fit-content; min-width: 100px; margin: 0 auto; display: block; padding: 8px 20px; }
        
        #successMode { background: #eab308; font-weight: 700; padding: 4px 16px; border-radius: 20px; margin-bottom: 15px; display: inline-block; color: #0f172a; }
        
        .popup-toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); border: 1px solid #334155; color: #fff; padding: 12px 24px; border-radius: 12px; display: none; z-index: 7000; width: fit-content; max-width: 85%; white-space: nowrap; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); pointer-events: none; font-weight: 600; }
        
        /* Header Actions & Menu Dropdown */
        .header-actions { position: absolute; top: 0; left: 0; right: 0; height: 40px; pointer-events: none; z-index: 10; display: flex; align-items: center; }
        #backBtn, #refreshBtn, #hamburgerBtn { position: absolute; top: 10px; pointer-events: auto; background:none; border:none; width:auto; padding:0; display:flex; align-items:center; text-decoration: none; box-shadow: none; }
        #backBtn { left: 12px; }
        #refreshBtn { left: 45px; }
        #hamburgerBtn { right: 10px; }
        #gaIndicator { position: absolute; top: 10px; left: 78px; color: #3b82f6; font-weight: 800; font-size: 14px; display: none; pointer-events: none; }
        
        .dropdown-menu { position: absolute; top: 35px; right: 10px; background: #1e293b; border: 1px solid #475569; border-radius: 8px; display: none; flex-direction: column; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); pointer-events: auto; min-width: 110px; }
        .dropdown-item { padding: 10px 15px; font-size: 0.9rem; cursor: pointer; color: #3b82f6; font-weight: 600; text-align: left; border-bottom: 1px solid #334155; }
        .dropdown-item:hover { background: #334155; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }
        
        /* Modifikasi Popup Histori Menjadi Senada Dark Mode */
        #historyPopup { position: absolute; top: 35px; right: 10px; background-color: #1e293b; border: 1px solid #475569; border-radius: 8px; width: 280px; max-height: 350px; overflow-y: auto; padding: 0; display: none; text-align: left; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); z-index: 5000; }
        .history-header { position: sticky; top: 0; background: #1e293b; padding: 8px 12px; z-index: 10; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: center; min-height: 45px; }
        #historySearchInput { display: none; width: 85%; height: 30px; border: 1px solid #475569; border-radius: 6px; padding: 0 10px; font-size: 0.85rem; text-align: left; background: #0f172a; color: #fff; margin-right: 35px; }
        #searchToggleBtn { position: absolute; right: 10px; cursor: pointer; display: flex; align-items: center; }
        
        #historyList { padding: 4px 12px 12px 12px; }
        #loaderOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .loader { border: 6px solid #334155; border-top: 6px solid #2563eb; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; }
        
        .history-item { padding: 8px; border-bottom: 1px solid #334155; cursor: pointer; transition: background 0.2s; }
        .history-item:hover { background: #334155; }
        .history-detail { display: none; padding: 8px; background: #0f172a; font-size: 0.8rem; color: #cbd5e1; border-radius: 6px; margin-top: 5px; text-align: left; line-height: 1.4; border: 1px solid #334155; }
        
        /* Gaya Khusus untuk Komponen Input/Password Gelap */
        #adminPass, #descPopupInput { background: #0f172a; color: #fff; border: 1px solid #475569 !important; text-align: left; }
        #adminPass:focus, #descPopupInput:focus { border-color: #2563eb !important; }
    </style>
</head>
<body>
<div id="loaderOverlay"><div class="loader"></div></div>
<div class="container">
    <div id="popupToast" class="popup-toast"></div>
    <div class="header-actions">
        <a href="https://pilipmul.github.io/SOT/dashboard.html" id="backBtn" title="Kembali ke Dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#38bdf8"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
        </a>
    
        <button id="refreshBtn" onclick="fetchDataAndUpdateUI(false)">
             <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#38bdf8"><path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/></svg>
        </button>
        <div id="gaIndicator">GA</div>
        <button id="hamburgerBtn" onclick="toggleDropdown(event)">
            <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#38bdf8"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
        </button>
        
        <div id="myDropdown" class="dropdown-menu">
            <div class="dropdown-item" onclick="toggleGAMode()">GA Mode</div>
            <div id="btnHistoryGA" class="dropdown-item" style="display:none;" onclick="toggleHistoryPopup(event)">~50 Trx</div>
        </div>
    </div>

    <div id="historyPopup">
        <div class="history-header">
            <h4 id="historyTitle" style="margin:0; color:#3b82f6;">~50 Trx</h4>
            <input type="text" id="historySearchInput" placeholder="Cari transaksi..." oninput="filterHistory()">
            <div id="searchToggleBtn" onclick="toggleHistorySearch(event)">
                <svg xmlns="http://www.w3.org/2000/svg" width="20px" height="20px" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </div>
        <div id="historyList"></div>
    </div>

    <div style="display: flex; justify-content: center; align-items: center; margin: 24px 0 16px 0; width: 100%;">
        <img id="titleBtn" src="https://raw.githubusercontent.com/pilipmul/PBC-cek-Piutang/c917d70c8d2a8f1630b8dd1400a2d13c2aa55d65/Title%20PBC%20B.png" alt="PBC SyncFlow" style="display: block; margin: 0 auto;">
    </div>
    <form id="myForm">
        <div id="nameWrapper">
            <input type="text" id="name" placeholder="Name" autocomplete="off" required readonly 
                   style="background-color: #1e293b; color: #94a3b8; cursor: not-allowed;">
            <div class="clear-btn" style="display: none !important;" onmousedown="clearInput(event, this)">×</div>
            <div id="nameList" class="autocomplete-list"></div>
        </div>
        <div id="itemContainer">
            <div class="row-3col item-row">
                <div style="position: relative;">
                    <input type="text" class="item" placeholder="Item" autocomplete="off" required>
                    <div class="clear-btn" onmousedown="clearInput(event, this)">×</div>
                    <div class="autocomplete-list"></div>
                </div>
                <div class="qty-wrapper">
                    <span class="stock-overlay"></span>
                    <input type="number" class="qty" min="1" placeholder="Qty" required>
                </div>
                <div style="position: relative;">
                    <textarea class="desc" placeholder="Notes" onmousedown="startLongPress(event, this)" onmouseup="cancelLongPress()" onmouseleave="cancelLongPress()" ontouchstart="startLongPress(event, this)" ontouchend="cancelLongPress()"></textarea>
                    <button type="button" class="delete-row">×</button>
                </div>
            </div>
        </div>
        <div class="btn-group">
            <button type="button" class="in" id="btnIn">IN</button>
            <button type="button" class="add-row" id="addRow">
                <svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 -960 960 960" width="32px" fill="#38bdf8"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
            </button>
            <button type="button" class="out" id="btnOut">OUT</button>
        </div>
    </form>
</div>

<div id="confirmPopup" class="popup-overlay"><div class="popup-box"><h3 id="confirmTitle" style="color:#3b82f6; font-weight:700;"></h3><div id="confirmItems" style="text-align:left; margin-bottom:25px; color:#cbd5e1;"></div><div class="btn-group"><button class="modal-btn" id="finalSubmitBtn">POST</button><button class="modal-btn" onclick="closeConfirmPopup()" style="background:#475569;">CANCEL</button></div></div></div>
<div id="successPopup" class="popup-overlay"><div class="popup-box"><div id="successMode"></div><div id="successItems" style="text-align:left; margin-bottom:20px; color:#cbd5e1;"></div><button class="modal-btn" onclick="closeSuccessPopup()">Close</button></div></div>
<div id="descPopup" class="popup-overlay"><div class="popup-box"><textarea id="descPopupInput" style="width:100%; height:120px; border:1px solid #475569; border-radius:8px; margin-bottom:10px; text-align: left; padding:10px;"></textarea><button class="modal-btn" onclick="saveDescPopup()">Save</button></div></div>
<div id="passPopup" class="popup-overlay"><div class="popup-box"><input type="password" id="adminPass" placeholder="Password" style="border:1px solid #475569; border-radius:8px; margin-bottom:15px; height:45px; padding: 0 10px;"><div class="btn-group"><button class="modal-btn" onclick="checkPassword()">OK</button><button class="modal-btn" onclick="closePassPopup()" style="background:#475569;">Batal</button></div></div></div>

<script>
    const userData = JSON.parse(localStorage.getItem("user"));
    if (!userData) {
        window.location.href = "login.html";
    }

    const scriptURL = 'https://script.google.com/macros/s/AKfycbwoz7fGFbbV5kDdKDGCvYxHsJG3Nm5_0KAk-9Nu7kYO05U_FW1MwI8DBch2amyT45pZmQ/exec';
    let nameData = [], itemData = [], itemStock = {}, lastTransactions = [], gaMode = false, activeTextarea = null, longPressTimer, passAction = "", currentMode = "", currentItems = [], currentName = "";

    function clearInput(e, btn) { e.preventDefault(); const inp = btn.parentElement.querySelector('input'); inp.value = ''; const list = btn.parentElement.querySelector('.autocomplete-list'); if(list) list.style.display = 'none'; inp.focus(); }
    function startLongPress(e, el) { activeTextarea = el; longPressTimer = setTimeout(() => { document.getElementById("descPopupInput").value = el.value; document.getElementById("descPopup").style.display = "flex"; document.getElementById("descPopupInput").focus(); }, 600); }
    function cancelLongPress() { clearTimeout(longPressTimer); }
    function saveDescPopup() { if (activeTextarea) activeTextarea.value = document.getElementById("descPopupInput").value; document.getElementById("descPopup").style.display = "none"; }
    function toggleDropdown(e) { e.stopPropagation(); const d = document.getElementById("myDropdown"); d.style.display = (d.style.display === "flex") ? "none" : "flex"; }
    function toggleGAMode() { document.getElementById("myDropdown").style.display = "none"; if (!gaMode) { passAction = "ga"; document.getElementById("passPopup").style.display = "flex"; document.getElementById("adminPass").focus(); } else { updateGAUI(false); } }
    function updateGAUI(status) { gaMode = status; document.getElementById("gaIndicator").style.display = gaMode ? "block" : "none"; document.getElementById("btnHistoryGA").style.display = gaMode ? "block" : "none"; const btnIn = document.getElementById("btnIn"); if (gaMode) { btnIn.style.opacity = "1"; btnIn.style.pointerEvents = "auto"; } else { btnIn.style.opacity = "0.25"; btnIn.style.pointerEvents = "none"; } initAutocomplete(); }
    
    async function fetchDataAndUpdateUI() { 
        const icon = document.getElementById("refreshIcon");
        if(icon) icon.classList.add("spinning"); 
        try { 
            const resp = await fetch(`${scriptURL}?action=getDropdownData`);
            const data = await resp.json(); 
            nameData = data.names || []; 
            itemData = data.items || []; 
            itemStock = data.stocks || {};
            lastTransactions = data.transactions || []; 
            initAutocomplete(); 
        } catch (e) { showToast("❌ Sync Error"); } finally { if(icon) icon.classList.remove("spinning"); } 
    }

    function initAutocomplete() { setupAutocomplete(document.getElementById("name"), document.getElementById("nameList"), nameData); document.querySelectorAll(".item-row").forEach(row => { setupAutocomplete(row.querySelector(".item"), row.querySelector(".autocomplete-list"), itemData, true, row.querySelector(".stock-overlay"), row.querySelector(".qty")); }); }
    function setupAutocomplete(input, box, data, isItem=false, overlay=null, qtyInput=null) { const updateOverlay = () => { if (isItem && gaMode && itemStock[input.value.trim()] !== undefined) { overlay.textContent = itemStock[input.value.trim()]; overlay.style.display = qtyInput.value ? "none" : "block"; qtyInput.classList.add("hide-placeholder"); } else if (overlay) { overlay.style.display = "none"; if(qtyInput) qtyInput.classList.remove("hide-placeholder"); } }; input.oninput = () => { const val = input.value.trim().toLowerCase(); updateOverlay(); if (!val) { box.style.display = "none"; return; } const match = data.filter(d => d.toLowerCase().includes(val) && (isItem && !gaMode ? (itemStock[d] || 0) > 0 : true)).slice(0, 10); box.innerHTML = match.map(m => `<div class="autocomplete-item">${m}</div>`).join(''); box.style.display = match.length ? "block" : "none"; box.querySelectorAll(".autocomplete-item").forEach(div => { div.onclick = () => { input.value = div.textContent; box.style.display = "none"; updateOverlay(); }; }); }; if (qtyInput) qtyInput.oninput = updateOverlay; }
    
    async function handleSubmit(mode) { currentName = document.getElementById("name").value.trim(); if (!nameData.includes(currentName)) return showToast("⚠️ Pilih Nama!"); currentItems = [...document.querySelectorAll(".item-row")].map(row => ({ item: row.querySelector(".item").value.trim(), qty: parseInt(row.querySelector(".qty").value), desc: row.querySelector(".desc").value.trim() })).filter(it => it.item && it.qty); if (!currentItems.length) return showToast("⚠️ Isi Item!"); currentMode = mode; document.getElementById("confirmTitle").innerText = mode.toUpperCase(); document.getElementById("confirmItems").innerHTML = currentItems.map(i => `- ${i.item}: <span style="color:#ef4444;">${i.qty}</span>`).join('<br>'); document.getElementById("confirmPopup").style.display = "flex"; document.getElementById("finalSubmitBtn").onclick = () => { document.getElementById("confirmPopup").style.display = "none"; executeFinalSubmit(mode, currentName, currentItems); }; }
    
    async function executeFinalSubmit(mode, name, items) { 
        document.getElementById("loaderOverlay").style.display = "flex";
        const body = new URLSearchParams(); 
        body.append('name', name); 
        body.append('mode', mode); 
        body.append('items', JSON.stringify(items)); 
        body.append('date', new Date().toLocaleDateString('id-ID'));
        try { 
            const resp = await fetch(`${scriptURL}?action=submitSyncflow`, { method: 'POST', body: body });
            const res = await resp.json(); 
            if (res.result === "success") { 
                showSuccessPopup(mode, items);
                document.getElementById("myForm").reset(); 
                const container = document.getElementById("itemContainer"); 
                while(container.children.length > 1) container.removeChild(container.lastChild); 
                document.getElementById("addRow").style.visibility = "visible"; 
                fetchDataAndUpdateUI();
            } else { showToast(res.error); } 
        } catch (e) { showToast("❌ Connection Error"); } finally { document.getElementById("loaderOverlay").style.display = "none"; } 
    }

    function checkPassword() { if (document.getElementById("adminPass").value === "azza") { document.getElementById("passPopup").style.display = "none"; document.getElementById("adminPass").value = ""; if (passAction === "in") executeFinalSubmit(currentMode, currentName, currentItems); else if (passAction === "ga") updateGAUI(true); } else showToast("❌ Salah!"); }
    function showToast(m) { const t = document.getElementById("popupToast"); t.textContent = m; t.style.display = "block"; setTimeout(() => t.style.display="none", 2500); }
    function showSuccessPopup(m, its) { document.getElementById("successMode").textContent = m.toUpperCase(); document.getElementById("successItems").innerHTML = its.map(i => `• ${i.item}: <span style="color:#ef4444;">${i.qty}</span>`).join('<br>'); document.getElementById("successPopup").style.display = "flex"; }
    function closeSuccessPopup() { document.getElementById("successPopup").style.display = "none"; }
    function closeConfirmPopup() { document.getElementById("confirmPopup").style.display = "none"; }
    function closePassPopup() { document.getElementById("passPopup").style.display = "none"; }

    function toggleHistoryPopup(e) { e.stopPropagation(); const p = document.getElementById("historyPopup"); if (p.style.display === "block") { p.style.display = "none"; resetHistoryUI(); } else { p.style.display = "block"; renderHistory(lastTransactions); } }
    function toggleHistorySearch(e) { e.stopPropagation(); const title = document.getElementById("historyTitle"); const input = document.getElementById("historySearchInput"); if (input.style.display === "block") { resetHistoryUI(); } else { title.style.display = "none"; input.style.display = "block"; input.focus(); } }
    function resetHistoryUI() { document.getElementById("historyTitle").style.display = "block"; const input = document.getElementById("historySearchInput"); input.style.display = "none"; input.value = ""; renderHistory(lastTransactions); }
    function filterHistory() { const val = document.getElementById("historySearchInput").value.toLowerCase(); const filtered = lastTransactions.filter(t => t[0].toLowerCase().includes(val) || t[1].toLowerCase().includes(val) || t[2].toLowerCase().includes(val) || t[3].toLowerCase().includes(val)); renderHistory(filtered); }

    function renderHistory(data) {
        document.getElementById("historyList").innerHTML = data.map((t, index) => `
            <div class="history-item" onclick="const det = document.getElementById('det-${index}'); det.style.display = det.style.display === 'block' ? 'none' : 'block';">
                <div style="font-size:0.85rem; display: flex; justify-content: space-between; align-items: center;">
                    <span><b>${t[0]}</b> <span style="color:${t[1]==='in'?'#10b981':'#ef4444'}">${t[1].toUpperCase()}</span></span>
                    <b>${t[2]}</b>
                </div>
                <div id="det-${index}" class="history-detail">
                    <div style="margin-top: 1px; padding-top: 1px;">
                        <b> ${t[3]}<br>
                        <b> ${t[4]}<br>
                        <b> ${t[5] || '-'}
                    </div>
                </div>
            </div>
        `).join('');
    }

    document.getElementById("addRow").onclick = () => { const container = document.getElementById("itemContainer"); const btnAdd = document.getElementById("addRow"); if (container.children.length < 5) { const clone = container.children[0].cloneNode(true); clone.querySelectorAll("input, textarea").forEach(i => i.value = ""); clone.querySelector(".stock-overlay").style.display = "none"; clone.querySelector(".autocomplete-list").style.display = "none"; const tx = clone.querySelector("textarea.desc"); tx.onmousedown = (e) => startLongPress(e, tx); tx.onmouseup = cancelLongPress; tx.onmouseleave = cancelLongPress; tx.ontouchstart = (e) => startLongPress(e, tx); tx.ontouchend = cancelLongPress; container.appendChild(clone); initAutocomplete(); if (container.children.length === 5) btnAdd.style.visibility = "hidden"; } };
    document.addEventListener("click", e => { 
        if (e.target.classList.contains("delete-row")) { e.target.closest(".item-row").remove(); if (document.getElementById("itemContainer").children.length < 5) { document.getElementById("addRow").style.visibility = "visible"; } } 
        if (!e.target.closest(".autocomplete-list") && !e.target.closest("input") && !e.target.closest(".clear-btn")) document.querySelectorAll(".autocomplete-list").forEach(l => l.style.display = "none"); 
        if (!e.target.closest("#myDropdown") && !e.target.closest("#hamburgerBtn")) document.getElementById("myDropdown").style.display = "none"; 
        if (!e.target.closest("#historyPopup") && !e.target.closest("#btnHistoryGA")) { document.getElementById("historyPopup").style.display = "none"; resetHistoryUI(); }
    });
    document.getElementById("btnIn").onclick = () => handleSubmit("in");
    document.getElementById("btnOut").onclick = () => handleSubmit("out");
    
    window.onload = function() {
        if (userData) { // Menggunakan variabel userData yang dideklarasikan di atas tadi
            try {
                // Mengisi otomatis kolom Nama
                if (userData.nama) {
                    const nameInput = document.getElementById("name");
                    nameInput.value = userData.nama;
                    
                    nameInput.dispatchEvent(new Event('input'));
                }
                
                if (userData.akses && userData.akses.accesControl) {
                    const nilaiAkses = userData.akses.accesControl.toString().toUpperCase().trim();
                    
                    if (nilaiAkses === "ACCESS CONTROL" || nilaiAkses === "YA" || nilaiAkses === "TRUE") {
                        isGA = true; 
                        updateGAUI(true); 
                        showToast("🔓 GA Mode Aktif Otomatis (Access Control)");
                    }
                }
            } catch (e) {
                console.error("Gagal membaca session integrasi SOT:", e);
            }
        }
    };
</script>
</body>
</html>
