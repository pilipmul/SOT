```html
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login SOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 300px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .msg {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }

    .error { color: red; }
    .success { color: green; }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login SOT</h2>

  <input type="text" id="nama" placeholder="Nama">
  <input type="password" id="pin" placeholder="PIN">

  <button onclick="login()">Login</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwoz7fGFbbV5kDdKDGCvYxHsJG3Nm5_0KAk-9Nu7kY0O5U_FW1MwI8DBch2amyT45pZmQ/exec";

async function login() {
  const nama = document.getElementById("nama").value.trim();
  const pin = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msg");

  msg.innerHTML = "Loading...";
  msg.className = "msg";

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const user = data.find(u => 
      u.nama.toLowerCase() === nama.toLowerCase()
    );

    if (!user) {
      msg.innerHTML = "User tidak ditemukan";
      msg.className = "msg error";
      return;
    }

    if (user.pin !== pin) {
      msg.innerHTML = "PIN salah";
      msg.className = "msg error";
      return;
    }

    msg.innerHTML = "Login berhasil!";
    msg.className = "msg success";

    // contoh redirect
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);

  } catch (err) {
    msg.innerHTML = "Gagal koneksi ke server";
    msg.className = "msg error";
  }
}
</script>

</body>
</html>
