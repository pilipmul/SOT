<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login SOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .msg {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }

    .error { color: red; }
    .success { color: green; }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login SOT</h2>

  <select id="nama">
    <option value="">-- Pilih Nama --</option>
  </select>

  <input type="password" id="pin" placeholder="Masukkan PIN">

  <button onclick="login()">Login</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwoz7fGFbbV5kDdKDGCvYxHsJG3Nm5_0KAk-9Nu7kYO05U_FW1MwI8DBch2amyT45pZmQ/exec";

// Load dropdown nama
async function loadUsers() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    console.log("DATA:", data);

    const select = document.getElementById("nama");

    data.forEach(u => {
      const opt = document.createElement("option");
      opt.value = u.nama;
      opt.textContent = u.nama;
      select.appendChild(opt);
    });

  } catch (err) {
    console.error(err);
    document.getElementById("msg").innerHTML = "Gagal load data";
  }
}

// Login pakai POST (AMAN)
async function login() {
  const nama = document.getElementById("nama").value;
  const pin = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msg");

  if (!nama) {
    msg.innerHTML = "Pilih nama dulu!";
    msg.className = "msg error";
    return;
  }

  if (!pin) {
    msg.innerHTML = "Masukkan PIN!";
    msg.className = "msg error";
    return;
  }

  msg.innerHTML = "Loading...";
  msg.className = "msg";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nama: nama,
        pin: pin
      })
    });

    const result = await res.json();

    console.log("LOGIN RESULT:", result);

    if (result.success) {
      msg.innerHTML = "Login berhasil!";
      msg.className = "msg success";

      // Simpan session
      localStorage.setItem("user", JSON.stringify(result));

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);

    } else {
      msg.innerHTML = result.message || "Login gagal";
      msg.className = "msg error";
    }

  } catch (err) {
    console.error(err);
    msg.innerHTML = "Gagal koneksi ke server";
    msg.className = "msg error";
  }
}

// Jalankan saat halaman load
window.onload = loadUsers;
</script>

</body>
</html>
